version: '3.8'
services:
  supplypro-db:
    image: mysql:8.0
    container_name: supplypro-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: supplypro
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - supplypro-net

  supplypro-backend:
    build: ./backend
    container_name: supplypro-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://supplypro-db:3306/supplypro?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - supplypro-db
    networks:
      - supplypro-net

  supplypro-frontend:
    build: ./frontend
    container_name: supplypro-frontend
    ports:
      - "80:80"
    depends_on:
      - supplypro-backend
    networks:
      - supplypro-net

networks:
  supplypro-net:
    driver: bridge

volumes:
  db_data:
