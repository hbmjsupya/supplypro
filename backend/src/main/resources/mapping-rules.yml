# =============================================
# SupplyPro 分类映射规则配置
# =============================================
# 此文件用于外部化管理映射规则，无需重新编译即可调整。
# 规则优先级：YAML配置中的规则会与代码中的硬编码规则合并使用。
# 修改后需重启应用生效。
# =============================================

# 关键词规则：当系统分类名称包含这些关键词时，映射到对应的项目末级分类
keyword_rules:
  - patterns: ["毛球修剪", "毛球修剪器", "粘毛", "除毛"]
    target_l3: "衣物护理"
  - patterns: ["干衣机", "烘干机"]
    target_l3: "衣物护理"
  - patterns: ["灭蚊灯", "灭蚊", "蚊灯"]
    target_l3: "驱蚊"
  - patterns: ["油烟机", "燃气灶", "消毒柜", "电饼铛", "煮蛋器", "煎蛋器", "面包机", "酸奶机",
               "电炖锅", "电蒸锅", "多士炉", "三明治机", "除湿机", "电暖器", "电暖气", "净水器",
               "热水器", "电视", "洗衣机", "空调", "电热饭盒", "冰淇淋机", "电子汤煲"]
    target_l3: "其他电器"
  - patterns: ["电烧烤箱"]
    target_l3: "空气炸锅/烤箱/微波炉"
  - patterns: ["破壁机", "豆浆机", "榨汁机", "打蛋器"]
    target_l3: "料理机/搅拌机"
  - patterns: ["养生壶", "煎药壶"]
    target_l3: "热水壶"
  - patterns: ["理疗仪", "理疗", "按摩", "足浴", "泡脚"]
    target_l3: "足浴盆/按摩器材"
  - patterns: ["美容", "洁面仪", "导入仪", "射频", "脱毛仪"]
    target_l3: "美容仪"
  - patterns: ["洗面奶", "洁面乳"]
    target_l3: "洁面/卸妆"
  - patterns: ["洗发水", "洗发露", "洗发乳", "洗护套装"]
