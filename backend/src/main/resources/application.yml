management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  health:
    show-details: always
    circuitbreakers:
      enabled: true
    db:
      enabled: true
    redis:
      enabled: true

server:
  port: 8080

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  application:
    name: supplypro-backend
  datasource:
    url: jdbc:mysql://localhost:3307/supplypro?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      pool-name: SupplyProHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
  logging:
    level:
      org.springframework.security: DEBUG
      com.supplypro: DEBUG
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "5.100"
    validate-on-migrate: false
    clean-disabled: false
    locations: classpath:db/migration
  sql:
    init:
      mode: never
      schema-locations: classpath:db/migration/V1.0__init_schema.sql
      # data-locations: classpath:db/migration/V1.1__init_data.sql
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  redis:
    host: localhost
    port: 6379
    timeout: 2000
  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 5s
    socket-timeout: 60s

resilience4j:
  retry:
    instances:
      purchaseOrderList:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      taxApi:
        maxAttempts: 3
        waitDuration: 2s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
  circuitbreaker:
    instances:
      purchaseOrderList:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 5s
      taxApi:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30m
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.supplypro.entity
  configuration:
    map-underscore-to-camel-case: true

supplypro:
  app:
    jwtSecret: supplyproSecretKeyForJwtAuthenticationSupplyProSecretKeyForJwtAuthentication
    jwtExpirationMs: 86400000
  rate-limit:
    enabled: true
    requests-per-second: 100

file:
  upload-dir: uploads
  allowed-types: jpg,jpeg,png,gif,webp,pdf,doc,docx,xls,xlsx
