server:
  port: 8080

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  application:
    name: supplypro-backend
  datasource:
    url: jdbc:mysql://localhost:3307/supplypro?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
  flyway:
    enabled: true
    baseline-on-migrate: true
  sql:
    init:
      mode: never
      schema-locations: classpath:db/migration/V1.0__init_schema.sql
      # data-locations: classpath:db/migration/V1.1__init_data.sql
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  redis:
    host: localhost
    port: 6379
    timeout: 2000

resilience4j:
  retry:
    instances:
      taxApi:
        maxAttempts: 3
        waitDuration: 2s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
  circuitbreaker:
    instances:
      taxApi:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30m
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.supplypro.entity
  configuration:
    map-underscore-to-camel-case: true

supplypro:
  app:
    jwtSecret: supplyproSecretKeyForJwtAuthenticationSupplyProSecretKeyForJwtAuthentication
    jwtExpirationMs: 86400000

file:
  upload-dir: uploads
  allowed-types: jpg,jpeg,png,pdf,doc,docx,xls,xlsx
