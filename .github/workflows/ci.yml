name: SupplyPro CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Verify JDK Version
      run: java -version

    - name: Build with Maven
      run: mvn clean package -DskipTests --file pom.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: backend-build
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false
        tags: supplypro-backend:latest

  frontend-test:
    runs-on: ubuntu-latest
    # Use cypress/included image which has Cypress pre-installed
    container: cypress/included:latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Dependencies
        run: npm ci
        env:
          # Skip downloading Cypress binary; use the one from the container
          CYPRESS_INSTALL_BINARY: 0
          
      - name: Run Cypress Tests
        run: |
          npm run dev -- --host &
          npx wait-on http://localhost:5173
          npm run cypress:run
